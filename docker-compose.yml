# DO NOT EDIT in forked projects. This file is maintained in the upstream template repository.
version: "3.8"

services:
  devcontainer:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: Asia/Tokyo
        GIT_DELTA_VERSION: 0.18.2
        ZSH_IN_DOCKER_VERSION: 1.2.0

    container_name: pokemon-terminal-devcontainer

    # Run as node user
    user: node

    # Mount workspace and volumes
    volumes:
      # Workspace
      - .:/workspace:cached

      # Persist bash history
      - bashhistory:/commandhistory

      # Mount Claude Code configuration and credentials
      - claude:/home/node/.claude

      # Persist npm cache
      - npm-cache:/home/node/.npm

    # Expose application ports
    # Environment variables
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
      - PATH=/usr/local/share/npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/node/.local/bin

    # Working directory
    working_dir: /workspace

    # Keep container running
    tty: true
    stdin_open: true

    # Use zsh as default shell
    command: /bin/zsh

    # Restart policy
    restart: unless-stopped

volumes:
  bashhistory:
  npm-cache:
  claude:
